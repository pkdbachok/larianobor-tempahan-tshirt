  <style>
    :root {
      color-scheme: light;
      --red-950: #4a0808;
      --red-900: #681010;
      --red-800: #8f1515;
      --red-700: #ad1b16;
      --orange-500: #f06a13;
      --gold-400: #f5b82e;
      --ink: #241b1b;
      --muted: #716565;
      --surface: rgba(255,255,255,.94);
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: max(24px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, rgba(245,184,46,.30), transparent 27rem),
        radial-gradient(circle at 90% 85%, rgba(240,106,19,.24), transparent 26rem),
        linear-gradient(145deg, #5f0c0c 0%, #971814 48%, #d44916 100%);
    }

    .card {
      width: min(980px, 100%);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.45);
      border-radius: 28px;
      background: var(--surface);
      box-shadow: 0 30px 80px rgba(56, 4, 4, .34);
      backdrop-filter: blur(14px);
    }

    .hero {
      position: relative;
      background: #f5f1ee;
    }

    .hero img {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 1200 / 630;
      object-fit: cover;
    }

    .tag {
      position: absolute;
      top: 18px;
      left: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 13px;
      border: 1px solid rgba(255,255,255,.70);
      border-radius: 999px;
      color: #fff;
      background: rgba(92, 9, 9, .86);
      box-shadow: 0 8px 22px rgba(40, 0, 0, .24);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      backdrop-filter: blur(9px);
    }

    .content {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: center;
      padding: clamp(22px, 4vw, 38px);
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1.04;
      letter-spacing: -.035em;
    }

    .subtitle {
      margin: 11px 0 0;
      max-width: 680px;
      color: var(--muted);
      font-size: clamp(15px, 2vw, 18px);
      line-height: 1.55;
    }

    .button {
      min-width: 220px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 15px 22px;
      border-radius: 15px;
      color: #fff;
      background: linear-gradient(135deg, var(--red-800), var(--orange-500));
      box-shadow: 0 14px 32px rgba(143, 21, 21, .25);
      font-weight: 800;
      text-decoration: none;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 38px rgba(143, 21, 21, .32);
    }

    .button:focus-visible {
      outline: 4px solid rgba(245,184,46,.65);
      outline-offset: 4px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-top: 15px;
      color: #8b7777;
      font-size: 13px;
    }

    .spinner {
      width: 15px;
      height: 15px;
      flex: 0 0 auto;
      border: 2px solid rgba(143,21,21,.18);
      border-top-color: var(--red-800);
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 720px) {
      body { padding: 0; background: #7f1111; }
      .card { min-height: 100vh; border: 0; border-radius: 0; }
      .content { grid-template-columns: 1fr; gap: 20px; }
      .button { width: 100%; }
      .tag { top: 12px; left: 12px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
    }

  <main class="card" aria-labelledby="page-title">

    <section class="content">

        Buka Tempahan
        <span aria-hidden="true">→</span>

    </section>
