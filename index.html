  <noscript>
    <style>

        display: none;

 <script>
  (() => {
    'use strict';

    const targetUrl =
      'https://sites.google.com/moh.gov.my/pkdbachoklarianobor26/tempahan-t-shirt-cap';

    /*
     * Order closing time:
     * 7 August 2026, 11:59:59 pm
     * Malaysia time, UTC+08:00.
     *
     * This countdown is informational only.
     * It never disables the button or redirect to the Laman Tempahan.
     */
    const closingTime =
      new Date(
        '2026-08-06T23:59:59+08:00'
      ).getTime();

    const daysElement =
      document.getElementById(
        'countdown-days'
      );

    const hoursElement =
      document.getElementById(
        'countdown-hours'
      );

    const minutesElement =
      document.getElementById(
        'countdown-minutes'
      );

    const secondsElement =
      document.getElementById(
        'countdown-seconds'
      );

    const messageElement =
      document.getElementById(
        'countdown-message'
      );

    const countdownCard =
      document.querySelector(
        '.countdown-card'
      );


    function formatNumber(value) {
      return String(value).padStart(
        2,
        '0'
      );
    }


    function updateCountdown() {
      const now =
        Date.now();

      const remaining =
        closingTime - now;

      if (remaining <= 0) {
        daysElement.textContent =
          '00';

        hoursElement.textContent =
          '00';

        minutesElement.textContent =
          '00';

        secondsElement.textContent =
          '00';

        messageElement.textContent =
          'Tarikh tutup tempahan telah tiba. Laman Tempahan masih boleh dibuka untuk semakan.';

        countdownCard.classList.add(
          'closed'
        );

        return false;
      }

      const totalSeconds =
        Math.floor(
          remaining / 1000
        );

      const days =
        Math.floor(
          totalSeconds / 86400
        );

      const hours =
        Math.floor(
          (
            totalSeconds % 86400
          ) / 3600
        );

      const minutes =
        Math.floor(
          (
            totalSeconds % 3600
          ) / 60
        );

      const seconds =
        totalSeconds % 60;

      daysElement.textContent =
        formatNumber(days);

      hoursElement.textContent =
        formatNumber(hours);

      minutesElement.textContent =
        formatNumber(minutes);

      secondsElement.textContent =
        formatNumber(seconds);

      messageElement.textContent =
        'Tempahan masih dibuka. Sila ke Laman Tempahan sebelum tarikh tutup.';

      countdownCard.classList.remove(
        'closed'
      );

      return true;
    }


    updateCountdown();

    const countdownInterval =
      window.setInterval(
        () => {
          const stillRunning =
            updateCountdown();

          if (!stillRunning) {
            window.clearInterval(
              countdownInterval
            );
          }
        },
        1000
      );


    const params =
      new URLSearchParams(
        window.location.search
      );

    /*
     * Add ?preview=1 to inspect the landing page
     * without automatic forwarding.
     *
     * The timer does not block the Laman Tempahan.
     */
    if (!params.has('preview')) {
      window.setTimeout(
        () => {
          window.location.replace(
            targetUrl
          );
        },
        6000
      );
    }
  })();
</script>
